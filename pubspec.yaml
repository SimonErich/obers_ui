name: obers_ui
description: A comprehensive Flutter UI kit with design tokens, responsive utilities, and accessible components.
version: 0.1.0
publish_to: 'none'
topics:
  - ui
  - widgets
  - design-system
  - theme

environment:
  sdk: '>=3.11.0 <4.0.0'
  flutter: '>=3.41.0'

dependencies:
  flutter:
    sdk: flutter
  shared_preferences: ^2.3.0
  intl: ^0.20.0
  file_picker: ^8.1.0
  web: ^1.1.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  very_good_analysis: ^7.0.0
  golden_toolkit: ^0.15.0
  mocktail: ^1.0.4
