name: Documentation & Widgetbook

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    name: Build Documentation & Widgetbook
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Flutter setup
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.2'
          channel: stable

      # Python + MkDocs setup
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install MkDocs and plugins
        run: pip install mkdocs-material mkdocs-minify-plugin

      # Build MkDocs documentation (becomes the site root)
      - name: Build MkDocs
        working-directory: doc/documentation
        run: mkdocs build --strict --site-dir ../../_site

      # Build API documentation
      - run: flutter pub get
      - run: dart doc
      - name: Copy API docs to _site/api/
        run: |
          mkdir -p _site/api
          cp -r doc/api/* _site/api/

      # Build Widgetbook
      - name: Install Widgetbook dependencies
        working-directory: widgetbook
        run: flutter pub get
      - name: Build Widgetbook for web
        working-directory: widgetbook
        run: flutter build web --release --base-href /obers_ui/widgetbook/
      - name: Copy Widgetbook to _site/widgetbook/
        run: |
          mkdir -p _site/widgetbook
          cp -r widgetbook/build/web/* _site/widgetbook/

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    name: Deploy to Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
