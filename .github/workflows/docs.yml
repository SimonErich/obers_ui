name: Documentation & Widgetbook

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    name: Build Documentation & Widgetbook
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.2'
          channel: stable

      # Build API documentation
      - run: flutter pub get
      - run: dart doc

      # Build Widgetbook
      - name: Install Widgetbook dependencies
        working-directory: widgetbook
        run: flutter pub get
      - name: Build Widgetbook for web
        working-directory: widgetbook
        run: flutter build web --release --base-href /obers_ui/widgetbook/

      # Combine outputs into a single site
      - name: Assemble site
        run: |
          mkdir -p _site
          cp -r doc/api/* _site/
          mkdir -p _site/widgetbook
          cp -r widgetbook/build/web/* _site/widgetbook/

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    name: Deploy to Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
